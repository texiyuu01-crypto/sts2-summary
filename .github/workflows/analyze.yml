name: Scheduled Analysis

on:
  schedule:
    - cron: '0 0 * * *' # 毎日日本時間の午前9時（UTC 0時）に実行
  workflow_dispatch:      # 手動実行ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true # Git LFSで管理された巨大JSONの実体を取得

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run crawler
        run: python analysis/crawler.py
        continue-on-error: true

      - name: Run analyzer
        run: python analysis/analyzer.py

      - name: Run split_stats
        run: python analysis/split_stats.py

      - name: Commit and Push (safe LFS-aware)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Ensure LFS is active locally and repo aligns with remote to avoid pointer/data conflicts
          git lfs install --local || true
          git fetch origin --prune
          git reset --hard origin/main

          # Stage generated files (use || true to avoid step failure if no matches)
          git add src/data/runs_*.json || true
          git add src/data/tier_stats.json || true
          git add public/data/*.json || true

          # If nothing staged, exit cleanly
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "Update latest runs data and stats" || true

          # Only push if HEAD differs from origin/main
          UPSTREAM=$(git rev-parse --verify origin/main)
          HEADREF=$(git rev-parse --verify HEAD)
          if [ "$UPSTREAM" != "$HEADREF" ]; then
            git push origin HEAD:main
          else
            echo "No new commit to push."
          fi