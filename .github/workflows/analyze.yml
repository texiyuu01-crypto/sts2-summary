name: Scheduled Analysis

on:
  schedule:
    - cron: '0 0 * * *' # 毎日日本時間の午前9時（UTC 0時）に実行
  workflow_dispatch:      # 手動実行ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          lfs: true # Git LFSで管理された巨大JSONの実体を取得

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run crawler
        run: python analysis/crawler.py

      - name: Run analyzer
        run: python analysis/analyzer.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 修正ポイント：
          # 1. 増加した日別JSON（runs_*.json）をすべて追加
          # 2. 更新された統計データ（tier_stats.json）を追加
          git add src/data/runs_*.json
          git add src/data/tier_stats.json
          
          git commit -m "Update latest runs data and stats" || exit 0
          git push